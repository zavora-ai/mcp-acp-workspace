<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="controlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="codingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="520" fill="#f8fafc" rx="12"/>

  <!-- Layer 1: ADK-Rust Agent / MCP Client -->
  <rect x="150" y="20" width="300" height="50" rx="10" fill="url(#agentGrad)"/>
  <text x="300" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="bold">ADK-Rust Agent / MCP Client</text>
  <text x="300" y="58" text-anchor="middle" fill="#d1fae5" font-size="10">Orchestrates coding tasks</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="70" x2="300" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: mcp-acp-workspace (Enterprise Control Plane) -->
  <rect x="100" y="105" width="400" height="110" rx="10" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="100" y="105" width="400" height="28" rx="10" fill="url(#controlGrad)"/>
  <rect x="100" y="120" width="400" height="13" fill="url(#controlGrad)"/>
  <text x="300" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">mcp-acp-workspace</text>
  <text x="500" y="123" text-anchor="end" fill="#e9d5ff" font-size="9">Enterprise Control Plane</text>

  <text x="130" y="155" font-size="10" fill="#5b21b6">• Permission gates</text>
  <text x="130" y="172" font-size="10" fill="#5b21b6">• Patch review</text>
  <text x="130" y="189" font-size="10" fill="#5b21b6">• Audit trail</text>
  <text x="320" y="155" font-size="10" fill="#5b21b6">• Session lifecycle</text>
  <text x="320" y="172" font-size="10" fill="#5b21b6">• Governance policy</text>
  <text x="320" y="189" font-size="10" fill="#5b21b6">• Agent exposure</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="215" x2="300" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: ACP Wire Protocol -->
  <rect x="100" y="255" width="400" height="120" rx="10" fill="white" stroke="#d97706" stroke-width="2"/>
  <rect x="100" y="255" width="400" height="28" rx="10" fill="url(#wireGrad)"/>
  <rect x="100" y="270" width="400" height="13" fill="url(#wireGrad)"/>
  <text x="300" y="273" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ACP Wire Protocol</text>
  <text x="500" y="273" text-anchor="end" fill="#fef3c7" font-size="9">stdio / HTTP JSON-RPC</text>

  <text x="130" y="305" font-size="10" fill="#92400e">initialize → version negotiation</text>
  <text x="130" y="322" font-size="10" fill="#92400e">session/new → workspace binding</text>
  <text x="130" y="339" font-size="10" fill="#92400e">session/prompt → ContentBlock[]</text>
  <text x="130" y="356" font-size="10" fill="#92400e">session/update → streaming events</text>
  <text x="380" y="305" font-size="10" fill="#92400e">permission requests</text>
  <text x="380" y="322" font-size="10" fill="#92400e">tool calls</text>
  <text x="380" y="339" font-size="10" fill="#92400e">session/cancel (notif)</text>
  <text x="380" y="356" font-size="10" fill="#92400e">session/close</text>

  <!-- Arrow 3 -->
  <line x1="300" y1="375" x2="300" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Coding Agents -->
  <rect x="130" y="415" width="340" height="80" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
  <rect x="130" y="415" width="340" height="28" rx="10" fill="url(#codingGrad)"/>
  <rect x="130" y="430" width="340" height="13" fill="url(#codingGrad)"/>
  <text x="300" y="433" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Coding Agents</text>

  <rect x="155" y="455" width="90" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="200" y="473" text-anchor="middle" font-size="10" fill="#1e40af">Claude Code</text>

  <rect x="255" y="455" width="90" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="300" y="473" text-anchor="middle" font-size="10" fill="#1e40af">Codex CLI</text>

  <rect x="355" y="455" width="90" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="400" y="473" text-anchor="middle" font-size="10" fill="#1e40af">Custom ACP</text>

  <!-- Badge -->
  <rect x="190" y="502" width="220" height="14" rx="7" fill="#4f46e5" opacity="0.9"/>
  <text x="300" y="513" text-anchor="middle" fill="white" font-size="9" font-weight="bold">9 Tools · ACP v0.1 · ADK-Rust Enterprise</text>
</svg>
